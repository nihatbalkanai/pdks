server {
    listen 80;
    server_name www.techsend.io techsend.io;
    
    # HTTP'den HTTPS'ye yönlendirme (SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.techsend.io techsend.io;
    
    # Laravel Public Dizini
    root /var/www/pdks/public;
    index index.php;

    # SSL Sertifika Yolları (Let's Encrypt örneği)
    ssl_certificate /etc/letsencrypt/live/techsend.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techsend.io/privkey.pem;
    
    # Modern SSL Protocols ve Şifreleme (Güvenlik)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # Güvenlik Başlıkları (HSTS, XSS, Clickjacking vb.)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Rate Limiting (Saniyede Cihazlardan Sınırsız, kullanıcılardan sınırlı)
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # API Güvenliği ve Cors (Mobil/PDKS Cihaz İstekleri için)
    location /api {
        # limit_req zone=api_limit burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        
        # PHP-FPM Soketi
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        
        # 10.000 Firma Sorgusu ve Sürecin Zaman Aşımı Optimizasyonu
        fastcgi_read_timeout 300;
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Web Socket (Laravel Reverb) için yönlendirme kuralı
    location /app {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Statik Dosyaları ve Yüklenmiş Medyaları Cache'le
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Gizli dosyalara erişimi engelle
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
